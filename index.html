<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>芭樂汁團購</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .drawer-up { transform: translateY(0); }
    </style>
</head>
<body class="bg-stone-50">

    <nav class="bg-white p-4 border-b border-stone-200 sticky top-0 z-50">
        <h1 class="text-xl font-black text-green-600">GUAVA HUB</h1>
        <p class="text-[10px] text-stone-400">芭樂汁團購</p>
    </nav>

    <main id="menu" class="p-4 space-y-4 max-w-md mx-auto">
        <p class="text-center py-20 text-stone-300 italic">正在喚醒芭樂汁...</p>
    </main>

    <div id="checkout-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-stone-900 text-white p-5 rounded-3xl shadow-2xl flex justify-between items-center z-50 translate-y-32 transition-transform duration-500">
        <div>
            <p id="item-count" class="text-xs opacity-50">0 份餐點</p>
            <p class="text-2xl font-black text-green-400">$<span id="total-price">0</span></p>
        </div>
        <button onclick="openDrawer()" class="bg-green-500 text-black px-8 py-3 rounded-2xl font-black">結帳</button>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-[60] hidden" onclick="closeDrawer()"></div>
    <div id="drawer" class="fixed bottom-0 left-0 right-0 bg-white p-8 rounded-t-[2rem] z-[70] translate-y-full transition-transform duration-300">
        <h2 class="text-2xl font-black mb-4">確認訂單</h2>
        <div id="summary-list" class="space-y-2 mb-6 border-b pb-4"></div>
        <input type="text" id="user-name" placeholder="輸入你的名字" class="w-full bg-stone-100 p-4 rounded-xl mb-4 font-bold outline-none ring-2 ring-stone-200 focus:ring-green-500">
        <button onclick="sendOrder()" id="send-btn" class="w-full bg-green-500 py-5 rounded-2xl font-black text-lg shadow-lg">發送訂單 🚀</button>
    </div>

    <script>
        // --- 設定你截圖中的新 Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyCgmCslx_E4tuQGOm8fccKNkCR2LnmjD8g",
            databaseURL: "https://studio-2370518507-ee5e3-default-rtdb.firebaseio.com",
            projectId: "studio-2370518507-ee5e3",
            appId: "1:960169055224:web:7db7942ca9876fbdbf3c0d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const products = [
            { id: 'p1', name: '經典芭樂汁', price: 50, emoji: '🍹' },
        ];

        let cart = {};

        function render() {
            const menu = document.getElementById('menu');
            menu.innerHTML = '';
            products.forEach(p => {
                menu.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl flex items-center justify-between shadow-sm border border-stone-100">
                        <div class="flex items-center gap-4">
                            <span class="text-3xl">${p.emoji}</span>
                            <div><h3 class="font-bold">${p.name}</h3><p class="text-green-600 font-bold">$${p.price}</p></div>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="updateCart('${p.id}', -1)" class="w-8 h-8 rounded-full bg-stone-100 font-bold">-</button>
                            <span id="qty-${p.id}" class="font-black w-4 text-center">0</span>
                            <button onclick="updateCart('${p.id}', 1)" class="w-8 h-8 rounded-full bg-stone-100 font-bold text-green-600">+</button>
                        </div>
                    </div>`;
            });
        }

        function updateCart(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] <= 0) delete cart[id];
            
            document.getElementById(`qty-${id}`).innerText = cart[id] || 0;

            let total = 0, count = 0;
            Object.keys(cart).forEach(pid => {
                const p = products.find(x => x.id === pid);
                total += p.price * cart[pid];
                count += cart[pid];
            });

            document.getElementById('total-price').innerText = total;
            document.getElementById('item-count').innerText = `${count} 份餐點`;
            document.getElementById('checkout-bar').style.transform = count > 0 ? 'translateX(-50%) translateY(0)' : 'translateX(-50%) translateY(120px)';
        }

        function openDrawer() {
            const list = document.getElementById('summary-list');
            list.innerHTML = '';
            Object.keys(cart).forEach(id => {
                const p = products.find(x => x.id === id);
                list.innerHTML += `<div class="flex justify-between font-bold"><span>${p.name} x${cart[id]}</span><span>$${p.price * cart[id]}</span></div>`;
            });
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('drawer').classList.add('drawer-up');
        }

        function closeDrawer() {
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('drawer').classList.remove('drawer-up');
        }

        function sendOrder() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("請輸入你的名字唷！");
            
            const btn = document.getElementById('send-btn');
            btn.innerText = "傳送中...";
            btn.disabled = true;

            const detail = Object.keys(cart).map(id => {
                const p = products.find(x => x.id === id);
                return `${p.name}x${cart[id]}`;
            }).join(', ');

            db.ref('orders').push({
                customer: name,
                items: detail,
                total: document.getElementById('total-price').innerText,
                time: Date.now()
            }).then(() => {
                // 發送完後自動重整
                alert("下單成功！");
                location.reload();
            });
        }

        render();
    </script>
</body>
</html>
