<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>芭樂汁團購｜GUAVA HUB</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#22c55e">
    <link rel="apple-touch-icon" href="1.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; font-family: sans-serif; }
        .drawer-up { transform: translateY(0) !important; }
        
        .btn-active:active { 
            transform: scale(0.92); 
            background-color: #f0fdf4 !important; 
            color: #16a34a !important;
            border-color: #16a34a !important;
        }
        
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 4px rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.3); }
            50% { box-shadow: 0 0 16px rgba(34, 197, 94, 0.5); border-color: rgba(34, 197, 94, 0.8); }
        }
        .glow-breathe { animation: breathe 2.5s infinite ease-in-out; }

        @media (min-width: 768px) {
            #menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        }
    </style>
</head>
<body class="bg-stone-50 min-h-screen">

    <nav class="bg-white p-4 border-b border-stone-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="space-y-1">
                <h1 class="text-2xl font-black text-green-600 italic tracking-tighter">GUAVA HUB 🍹</h1>
                <div class="bg-green-50 px-3 py-1 rounded-full border border-green-100 inline-flex items-center gap-2">
                    <span class="text-[10px] bg-green-500 text-white px-2 py-0.5 rounded-full font-bold">取貨資訊</span>
                    <p id="display-location" class="text-xs text-green-800 font-bold italic">讀取中...</p> 
                </div>
            </div>

            <div class="flex gap-2">
                <button onclick="checkAuth('收銀.html')" class="glow-breathe w-11 h-11 bg-green-900 text-green-50 rounded-xl flex items-center justify-center btn-active transition-all border border-green-800 shadow-sm">
                    <div class="text-center">
                        <p class="text-[7px] font-bold leading-none mb-0.5">收銀</p>
                        <span class="text-sm">💰</span>
                    </div>
                </button>
                <button onclick="checkAuth('後台.html')" class="glow-breathe w-11 h-11 bg-white border border-green-500 text-green-600 rounded-xl flex items-center justify-center btn-active transition-all shadow-sm">
                    <div class="text-center">
                        <p class="text-[7px] font-bold leading-none mb-0.5">管理</p>
                        <span class="text-sm">⚙️</span>
                    </div>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 pb-48">
        <div id="status-banner" class="mb-6 hidden">
            <div class="bg-red-50 border-2 border-red-200 text-red-600 p-5 rounded-[2.5rem] text-center font-black flex items-center justify-center gap-3 shadow-sm">
                <span class="text-2xl">⚠️</span>
                <span id="status-text" class="text-lg italic tracking-widest">今日已售完，歡迎下次預購</span>
            </div>
        </div>

        <section class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-stone-100 mb-6">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <img src="5.png" class="w-full md:w-40 h-40 rounded-3xl object-cover shadow-sm" alt="鮮榨芭樂汁">
                <div class="flex-1 space-y-3">
                    <h2 class="text-lg font-black text-stone-800 flex items-center gap-2">
                        <span class="w-2 h-6 bg-green-500 rounded-full"></span> 慢磨鮮榨．原汁原味
                    </h2>
                    <p class="text-sm text-stone-600 leading-relaxed font-medium">
                        堅持<span class="text-green-600 font-bold">無糖、無水</span>，保留最高營養與天然甘甜。
                    </p>
                </div>
            </div>
        </section>

        <div id="menu" class="space-y-4 md:space-y-0"></div>
    </main>

    <div id="checkout-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-xl bg-stone-900/95 backdrop-blur text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center z-50 translate-y-40 transition-all duration-500 border border-white/10">
        <div class="pl-2">
            <p id="item-count" class="text-[10px] opacity-50 font-bold tracking-widest uppercase">已選擇商品</p>
            <p class="text-3xl font-black text-green-400">$<span id="total-price">0</span></p>
        </div>
        <button id="checkout-btn" onclick="openDrawer()" class="bg-green-500 text-black px-10 py-4 rounded-[1.8rem] font-black text-lg btn-active transition-all">結帳去</button>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/60 z-[60] hidden opacity-0 transition-opacity duration-300" onclick="closeDrawer()"></div>
    <div id="drawer" class="fixed bottom-0 left-0 right-0 bg-white p-8 rounded-t-[3rem] z-[70] translate-y-full transition-transform duration-300 max-w-2xl mx-auto shadow-2xl">
        <div class="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-8"></div>
        <h2 class="text-2xl font-black mb-6 text-stone-800">訂單確認</h2>
        
        <div id="summary-list" class="space-y-3 mb-6"></div>
        
        <div class="space-y-4 mb-8">
            <div>
                <label class="text-xs font-bold text-stone-400 ml-2 mb-1 block uppercase tracking-tighter">收件人姓名</label>
                <input type="text" id="user-name" placeholder="您的稱呼" class="w-full bg-stone-100 p-4 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-green-500 text-lg">
            </div>
            <div>
                <label class="text-xs font-bold text-stone-400 ml-2 mb-1 block uppercase tracking-tighter">預計取貨時間</label>
                <input type="time" id="pickup-time" class="w-full bg-stone-100 p-4 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-green-500 text-lg">
            </div>
        </div>

        <button onclick="sendOrder()" id="send-btn" class="w-full bg-green-500 text-stone-900 py-5 rounded-[2rem] font-black text-xl shadow-xl btn-active">
            送出訂單 🚀
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCgmCslx_E4tuQGOm8fccKNkCR2LnmjD8g",
            databaseURL: "https://studio-2370518507-ee5e3-default-rtdb.firebaseio.com",
            projectId: "studio-2370518507-ee5e3",
            appId: "1:960169055224:web:7db7942ca9876fbdbf3c0d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. 監聽地點設定
        db.ref('config/pickupLocation').on('value', snap => {
            const loc = snap.val() || "請洽團購主確認地點";
            document.getElementById('display-location').innerText = loc;
        });

        // 2. 監聽營業狀態
        db.ref('config/shopStatus').on('value', snap => {
            const status = snap.val() || 'open';
            const banner = document.getElementById('status-banner');
            const statusText = document.getElementById('status-text');
            const checkoutBtn = document.getElementById('checkout-btn');
            const sendBtn = document.getElementById('send-btn');
            
            if (status === 'open') {
                banner.classList.add('hidden');
                checkoutBtn.innerText = "結帳去";
                checkoutBtn.disabled = false;
                checkoutBtn.className = "bg-green-500 text-black px-10 py-4 rounded-[1.8rem] font-black text-lg btn-active";
                sendBtn.disabled = false;
                sendBtn.innerText = "送出訂單 🚀";
                sendBtn.className = "w-full bg-green-500 text-stone-900 py-5 rounded-[2rem] font-black text-xl shadow-xl btn-active";
            } else {
                banner.classList.remove('hidden');
                const msg = status === 'soldout' ? "今日已售完 🍎" : "今日結束營業 😴";
                statusText.innerText = msg;
                
                checkoutBtn.innerText = "暫停收單";
                checkoutBtn.disabled = true;
                checkoutBtn.className = "bg-stone-400 text-stone-100 px-10 py-4 rounded-[1.8rem] font-black text-lg cursor-not-allowed";
                
                sendBtn.disabled = true;
                sendBtn.innerText = msg;
                sendBtn.className = "w-full bg-stone-300 text-stone-500 py-5 rounded-[2rem] font-black text-xl cursor-not-allowed";
            }
        });

        const products = [
            { id: 'big_1', name: '大瓶 (單瓶)', price: 70, img: '5.png', desc: '原味鮮榨' },
            { id: 'big_2', name: '大瓶 (2瓶優惠組)', price: 120, img: '5.png', desc: '超值省 $20' },
            { id: 'small_1', name: '小瓶 (單瓶)', price: 60, img: '2.png', desc: '隨身好喝' },
            { id: 'small_2', name: '小瓶 (2瓶優惠組)', price: 100, img: '2.png', desc: '超值省 $20' }
        ];

        let cart = {};

        function render() {
            const menu = document.getElementById('menu');
            menu.innerHTML = '';
            products.forEach(p => {
                menu.innerHTML += `
                    <div class="bg-white p-4 rounded-[2.5rem] flex items-center justify-between shadow-sm border border-stone-100">
                        <div class="flex items-center gap-3">
                            <img src="${p.img}" class="w-16 h-16 rounded-[1.5rem] object-cover" alt="${p.name}">
                            <div>
                                <h3 class="font-bold text-stone-800 text-base leading-tight">${p.name}</h3>
                                <p class="text-green-600 font-black text-lg">$${p.price}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 bg-stone-50 p-1 rounded-full border border-stone-100">
                            <button onclick="updateCart('${p.id}', -1)" class="w-9 h-9 rounded-full bg-white shadow-sm flex items-center justify-center font-bold text-stone-300 btn-active">-</button>
                            <span id="qty-${p.id}" class="font-black w-4 text-center">0</span>
                            <button onclick="updateCart('${p.id}', 1)" class="w-9 h-9 rounded-full bg-white shadow-sm flex items-center justify-center font-bold text-green-600 btn-active">+</button>
                        </div>
                    </div>`;
            });
        }

        function updateCart(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] <= 0) delete cart[id];
            document.getElementById(`qty-${id}`).innerText = cart[id] || 0;
            let total = 0, count = 0;
            Object.keys(cart).forEach(pid => {
                const p = products.find(x => x.id === pid);
                total += p.price * cart[pid];
                count += cart[pid];
            });
            document.getElementById('total-price').innerText = total;
            document.getElementById('item-count').innerText = `${count} ITEMS`;
            document.getElementById('checkout-bar').style.transform = count > 0 ? 'translateX(-50%) translateY(0)' : 'translateX(-50%) translateY(160px)';
        }

        function openDrawer() {
            const list = document.getElementById('summary-list');
            list.innerHTML = '';
            Object.keys(cart).forEach(id => {
                const p = products.find(x => x.id === id);
                list.innerHTML += `<div class="flex justify-between font-bold text-stone-700 bg-stone-50 p-4 rounded-2xl">
                    <span>${p.name} x${cart[id]}</span>
                    <span>$${p.price * cart[id]}</span>
                </div>`;
            });
            document.getElementById('overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('overlay').style.opacity = '1';
                document.getElementById('drawer').classList.add('drawer-up');
            }, 10);
        }

        function closeDrawer() {
            document.getElementById('overlay').style.opacity = '0';
            document.getElementById('drawer').classList.remove('drawer-up');
            setTimeout(() => document.getElementById('overlay').classList.add('hidden'), 300);
        }

        function checkAuth(targetUrl) {
            if (sessionStorage.getItem("adminAuth") === "true") {
                window.location.href = targetUrl;
                return;
            }
            const pw = prompt("請輸入管理密碼：");
            if (pw === "0000") { 
                sessionStorage.setItem("adminAuth", "true"); 
                window.location.href = targetUrl; 
            } else if (pw !== null) alert("密碼錯誤！");
        }

        function sendOrder() {
            const name = document.getElementById('user-name').value;
            const time = document.getElementById('pickup-time').value;
            if(!name || !time) return alert("請填寫姓名與取貨時間！");

            const btn = document.getElementById('send-btn');
            btn.innerText = "傳送中..."; btn.disabled = true;

            const detail = Object.keys(cart).map(id => {
                const p = products.find(x => x.id === id);
                return `${p.name}x${cart[id]}`;
            }).join(', ');

            db.ref('orders').push({
                customer: name, pickupTime: time, items: detail, total: document.getElementById('total-price').innerText, time: Date.now()
            }).then(() => { alert("🎉 下單成功！"); location.reload(); });
        }
        render();
    </script>
</body>
</html>
