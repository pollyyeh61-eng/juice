<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活力美髮｜芭樂汁團購</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#22c55e">
    <link rel="apple-touch-icon" href="1.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .drawer-up { transform: translateY(0) !important; }
        /* 電腦版 RWD 調整 */
        @media (min-width: 768px) {
            #menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        }
    </style>
</head>
<body class="bg-stone-50 min-h-screen">

    <nav class="bg-white p-4 border-b border-stone-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-green-600 italic">芭樂汁團購 🍹</h1>
                <div class="mt-2 bg-green-50 px-3 py-1 rounded-full border border-green-100 inline-flex items-center gap-2">
                    <span class="text-[10px] bg-green-500 text-white px-2 py-0.5 rounded-full font-bold">本日取貨點</span>
                    <p class="text-xs text-green-800 font-bold">自由黃昏市場 排 號</p> 
                </div>
            </div>
            <button id="install-btn" class="hidden md:block bg-stone-100 text-stone-600 px-4 py-2 rounded-xl text-sm font-bold">下載安裝 App</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 pb-32">
        <div id="menu" class="space-y-4 md:space-y-0">
            </div>
    </main>

    <div id="checkout-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-xl bg-stone-900/95 backdrop-blur text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center z-50 translate-y-40 transition-all duration-500 border border-white/10">
        <div class="pl-2">
            <p id="item-count" class="text-xs opacity-50 font-bold tracking-widest">0 ITEMS SELECTED</p>
            <p class="text-3xl font-black text-green-400">$<span id="total-price">0</span></p>
        </div>
        <button onclick="openDrawer()" class="bg-green-500 text-black px-10 py-4 rounded-[1.8rem] font-black text-lg active:scale-95 transition-transform shadow-lg shadow-green-500/20">
            結帳去
        </button>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/60 z-[60] hidden opacity-0 transition-opacity duration-300" onclick="closeDrawer()"></div>
    <div id="drawer" class="fixed bottom-0 left-0 right-0 bg-white p-8 rounded-t-[3rem] z-[70] translate-y-full transition-transform duration-300 border-t border-stone-100 max-w-2xl mx-auto">
        <div class="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-8"></div>
        <h2 class="text-2xl font-black mb-6 text-stone-800 flex items-center gap-2">
            <span class="w-2 h-8 bg-green-500 rounded-full"></span> 訂單確認
        </h2>
        <div id="summary-list" class="space-y-4 mb-8 max-h-[40vh] overflow-y-auto pr-2"></div>
        <div class="space-y-4">
            <input type="text" id="user-name" placeholder="請輸入姓名 (取貨用)" class="w-full bg-stone-100 p-5 rounded-2xl font-bold outline-none ring-2 ring-transparent focus:ring-green-500 transition-all text-lg">
            <button onclick="sendOrder()" id="send-btn" class="w-full bg-green-500 text-stone-900 py-5 rounded-[2rem] font-black text-xl shadow-xl shadow-green-100 active:scale-95 transition-all">
                送出訂單 🚀
            </button>
        </div>
    </div>

    <script>
        // PWA Service Worker 註冊
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => console.log('SW 註冊成功'), err => console.log('SW 註冊失敗', err));
            });
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCgmCslx_E4tuQGOm8fccKNkCR2LnmjD8g",
            databaseURL: "https://studio-2370518507-ee5e3-default-rtdb.firebaseio.com",
            projectId: "studio-2370518507-ee5e3",
            appId: "1:960169055224:web:7db7942ca9876fbdbf3c0d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const products = [
            { id: 'big', name: '經典芭樂汁 (大瓶)', price: 70, img: '1.png' },
            { id: 'small', name: '經典芭樂汁 (小瓶)', price: 60, img: '2.png' }
        ];

        let cart = {};

        function render() {
            const menu = document.getElementById('menu');
            menu.innerHTML = '';
            products.forEach(p => {
                menu.innerHTML += `
                    <div class="bg-white p-4 rounded-[2.5rem] flex items-center justify-between shadow-sm border border-stone-100 hover:shadow-md transition-shadow group">
                        <div class="flex items-center gap-4">
                            <div class="relative overflow-hidden rounded-[2rem]">
                                <img src="${p.img}" class="w-20 h-20 object-cover transform group-hover:scale-110 transition-transform duration-500" alt="${p.name}">
                            </div>
                            <div>
                                <h3 class="font-bold text-stone-800 text-lg">${p.name}</h3>
                                <p class="text-green-600 font-black text-xl">$${p.price}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 bg-stone-50 p-1.5 rounded-full border border-stone-100">
                            <button onclick="updateCart('${p.id}', -1)" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center font-bold text-stone-300 hover:text-red-400">-</button>
                            <span id="qty-${p.id}" class="font-black w-5 text-center text-lg">0</span>
                            <button onclick="updateCart('${p.id}', 1)" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center font-bold text-green-600 hover:scale-110 transition-transform">+</button>
                        </div>
                    </div>`;
            });
        }

        function updateCart(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] <= 0) delete cart[id];
            document.getElementById(`qty-${id}`).innerText = cart[id] || 0;
            let total = 0, count = 0;
            Object.keys(cart).forEach(pid => {
                const p = products.find(x => x.id === pid);
                total += p.price * cart[pid];
                count += cart[pid];
            });
            const bar = document.getElementById('checkout-bar');
            document.getElementById('total-price').innerText = total;
            document.getElementById('item-count').innerText = `${count} ITEMS SELECTED`;
            bar.style.transform = count > 0 ? 'translateX(-50%) translateY(0)' : 'translateX(-50%) translateY(160px)';
        }

        function openDrawer() {
            const list = document.getElementById('summary-list');
            list.innerHTML = '';
            Object.keys(cart).forEach(id => {
                const p = products.find(x => x.id === id);
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-stone-50 p-4 rounded-2xl">
                        <span class="font-bold text-stone-700">${p.name} <span class="text-green-500 ml-2">x${cart[id]}</span></span>
                        <span class="font-black text-stone-800">$${p.price * cart[id]}</span>
                    </div>`;
            });
            document.getElementById('overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('overlay').style.opacity = '1';
                document.getElementById('drawer').classList.add('drawer-up');
            }, 10);
        }

        function closeDrawer() {
            document.getElementById('overlay').style.opacity = '0';
            document.getElementById('drawer').classList.remove('drawer-up');
            setTimeout(() => document.getElementById('overlay').classList.add('hidden'), 300);
        }

        function sendOrder() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("請輸入您的姓名唷！");
            const btn = document.getElementById('send-btn');
            btn.innerText = "傳送訂單中...";
            btn.disabled = true;
            const detail = Object.keys(cart).map(id => {
                const p = products.find(x => x.id === id);
                return `${p.name}x${cart[id]}`;
            }).join(', ');
            db.ref('orders').push({
                customer: name, items: detail, total: document.getElementById('total-price').innerText, time: Date.now()
            }).then(() => {
                alert("🎉 下單成功！請至櫃台領取。");
                location.reload();
            });
        }
        render();
    </script>
</body>
</html>
