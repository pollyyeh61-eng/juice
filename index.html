<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>芭樂汁團購｜GUAVA HUB</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#22c55e">
    <link rel="apple-touch-icon" href="1.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; font-family: sans-serif; }
        .drawer-up { transform: translateY(0) !important; }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-stone-50 min-h-screen">

    <nav class="bg-white p-4 border-b border-stone-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-black text-green-600 italic tracking-tighter leading-none">GUAVA HUB 🍹</h1>
                <div class="flex flex-col items-end">
                    <div class="bg-green-50 px-3 py-1 rounded-full border border-green-100 flex items-center gap-2 mb-1">
                        <span class="text-[10px] bg-green-500 text-white px-2 py-0.5 rounded-full font-bold">取貨點</span>
                        <p id="current-location" class="text-xs text-green-800 font-bold tracking-tight">載入中...</p> 
                    </div>
                    <div id="status-badge" class="text-[10px] font-black px-2 py-0.5 rounded-md border hidden"></div>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-2">
                <button id="pwa-install-btn" onclick="triggerPWAInstall()" class="h-10 bg-red-50 text-red-600 border border-red-100 rounded-xl text-[11px] font-black flex items-center justify-center gap-1 btn-active transition-all">📲 下載</button>
                <button onclick="shareApp()" class="h-10 bg-blue-50 text-blue-600 border border-blue-100 rounded-xl text-[11px] font-black flex items-center justify-center gap-1 btn-active transition-all">🔗 分享</button>
                <button onclick="checkAuth('收銀.html')" class="h-10 bg-orange-50 text-orange-600 border border-orange-100 rounded-xl text-[11px] font-black flex items-center justify-center gap-1 btn-active transition-all">💰 收銀</button>
                <button onclick="checkAuth('後台.html')" class="h-10 bg-green-50 text-green-600 border border-green-100 rounded-xl text-[11px] font-black flex items-center justify-center gap-1 btn-active transition-all">⚙️ 管理</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 pb-12">
        <div id="status-notice" class="hidden mb-6 p-8 rounded-[2.5rem] text-center border-2">
            <h2 id="notice-title" class="text-2xl font-black mb-2"></h2>
            <p id="notice-desc" class="text-sm font-medium opacity-80"></p>
        </div>

        <section class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-stone-100 mb-6">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <img src="1000026536.jpg" class="w-full md:w-40 h-40 rounded-3xl object-cover shadow-sm" alt="鮮榨芭樂汁">
                <div class="flex-1 space-y-4">
                    <div>
                        <h2 class="text-lg font-black text-stone-800 flex items-center gap-2">
                            <span class="w-2 h-6 bg-green-500 rounded-full"></span> 慢磨鮮榨．原汁原味
                        </h2>
                        <p class="text-sm text-stone-600 leading-relaxed font-medium mt-2">
                            我們堅持採用慢磨機果渣分離技術，完美保留芭樂最純粹的維生素與清香。每一滴果汁都承諾無糖、無水、無添加。
                        </p>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-amber-50 p-6 rounded-[2.5rem] border border-amber-100 mb-6">
            <h3 class="text-sm font-black text-amber-800 mb-3 flex items-center gap-2">🍋 建議喝法</h3>
            <ul class="text-xs text-amber-700 space-y-2 font-bold leading-relaxed">
                <li>1. 現喝最鮮：建議兩小時內飲用，口感最清爽。</li>
                <li>2. 微凍更爽：冷凍 15 分鐘，芭樂果味更有層次。</li>
                <li>3. 飲前搖勻：天然果膠易沉澱，搖一搖更美味。</li>
                <li>3. 甘梅口味：加入甘梅粉，不同風味哦。</li>
            </ul>
        </section>

        <div id="menu-container">
            <div id="menu" class="space-y-4 mb-8"></div>
        </div>

        <div id="order-success-info" class="hidden mb-20"></div>
    </main>

    <div id="checkout-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] ..."></div>

    <script>
        // --- 1. Firebase 初始化 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCgmCslx_E4tuQGOm8fccKNkCR2LnmjD8g",
            databaseURL: "https://studio-2370518507-ee5e3-default-rtdb.firebaseio.com",
            projectId: "studio-2370518507-ee5e3",
            appId: "1:960169055224:web:7db7942ca9876fbdbf3c0d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. PWA 下載邏輯補回 ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwa-install-btn').classList.remove('opacity-30');
        });

        async function triggerPWAInstall() {
            if (!deferredPrompt) {
                alert("手機瀏覽器：請點選功能選單「新增至主畫面」\niPhone：請點選分享按鈕「加入主畫面」");
                return;
            }
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') deferredPrompt = null;
        }

        // --- 3. 分享邏輯補回 ---
        async function shareApp() {
            if (navigator.share) {
                navigator.share({
                    title: 'GUAVA HUB 芭樂汁團購',
                    text: '這家芭樂汁超好喝！快來預訂～',
                    url: window.location.href
                }).catch(() => {});
            } else {
                alert("請複製網址分享給好友：\n" + window.location.href);
            }
        }

        // --- 4. 營業狀態與取貨點監聽 ---
        const products = [
            { id: 'big_1', name: '大瓶 (單瓶)', price: 70, img: '5.png' },
            { id: 'big_2', name: '大瓶 (2瓶優惠組)', price: 120, img: '5.png' },
            { id: 'small_1', name: '小瓶 (單瓶)', price: 60, img: '2.png' },
            { id: 'small_2', name: '小瓶 (2瓶優惠組)', price: 100, img: '2.png' }
        ];

        let cart = {};
        let businessStatus = "營業中";

        window.onload = () => {
            db.ref('config/pickupLocation').on('value', snap => {
                document.getElementById('current-location').innerText = snap.val() || "載入中...";
            });
            db.ref('config/businessStatus').on('value', snap => {
                businessStatus = snap.val() || "營業中";
                applyBusinessStatus();
            });
            render();
        };

        function applyBusinessStatus() {
            const badge = document.getElementById('status-badge');
            const notice = document.getElementById('status-notice');
            const menu = document.getElementById('menu-container');
            
            badge.classList.remove('hidden', 'bg-green-100', 'text-green-600', 'bg-amber-100', 'text-amber-600', 'bg-red-100', 'text-red-600');
            notice.classList.add('hidden');
            menu.classList.remove('opacity-20', 'pointer-events-none');

            if (businessStatus === "營業中") {
                badge.innerText = "● 營業中";
                badge.classList.add('bg-green-100', 'text-green-600', 'border-green-200');
            } else if (businessStatus === "已售完") {
                badge.innerText = "● 已售完";
                badge.classList.add('bg-amber-100', 'text-amber-600', 'border-amber-200');
                showNotice("今日已售完", "現貨已被搶訂一空，感謝支持！", "bg-amber-50", "border-amber-200", "text-amber-800");
                menu.classList.add('opacity-20', 'pointer-events-none');
            } else {
                badge.innerText = "● 休息中";
                badge.classList.add('bg-red-100', 'text-red-600', 'border-red-200');
                showNotice("本日已結束營業", "老闆收攤休息囉，我們明天見！", "bg-stone-100", "border-stone-200", "text-stone-800");
                menu.classList.add('opacity-20', 'pointer-events-none');
            }
            badge.classList.remove('hidden');
        }

        function showNotice(title, desc, bgColor, borderColor, textColor) {
            const notice = document.getElementById('status-notice');
            notice.className = `hidden mb-6 p-8 rounded-[2.5rem] text-center border-2 ${bgColor} ${borderColor} ${textColor}`;
            document.getElementById('notice-title').innerText = title;
            document.getElementById('notice-desc').innerText = desc;
            notice.classList.remove('hidden');
        }

        // ... (render, updateCart 等函數與原本相同) ...
        function render() {
            const menu = document.getElementById('menu');
            menu.innerHTML = '';
            products.forEach(p => {
                const qty = cart[p.id] || 0;
                menu.innerHTML += `
                    <div class="bg-white p-4 rounded-[2.5rem] flex items-center justify-between shadow-sm border border-stone-100">
                        <div class="flex items-center gap-3">
                            <img src="${p.img}" class="w-16 h-16 rounded-[1.5rem] object-cover">
                            <div>
                                <h3 class="font-bold text-stone-800 text-base leading-tight">${p.name}</h3>
                                <p class="text-green-600 font-black text-lg">$${p.price}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 bg-stone-50 p-1 rounded-full border border-stone-100">
                            <button onclick="updateCart('${p.id}', -1)" class="w-9 h-9 rounded-full bg-white shadow-sm flex items-center justify-center font-bold text-stone-300">-</button>
                            <span id="qty-${p.id}" class="font-black w-4 text-center text-sm">${qty}</span>
                            <button onclick="updateCart('${p.id}', 1)" class="w-9 h-9 rounded-full bg-white shadow-sm flex items-center justify-center font-bold text-green-600">+</button>
                        </div>
                    </div>`;
            });
        }

        function updateCart(id, change) {
            if(businessStatus !== "營業中") return;
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] <= 0) delete cart[id];
            render(); // 重新渲染確保數字正確
            let total = 0, count = 0;
            Object.keys(cart).forEach(pid => {
                total += products.find(x => x.id === pid).price * cart[pid];
                count += cart[pid];
            });
            // 此處省略控制 checkout-bar 顯示的代碼...
        }

        function checkAuth(url) {
            if(sessionStorage.getItem('admin')==='ok') { window.location.href=url; return; }
            if(prompt('密碼')==='0000') { sessionStorage.setItem('admin','ok'); window.location.href=url; }
        }
    </script>
</body>
</html>
