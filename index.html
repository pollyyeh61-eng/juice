<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>芭樂汁團購｜GUAVA HUB</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#22c55e">
    <link rel="apple-touch-icon" href="1.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; font-family: sans-serif; }
        .drawer-up { transform: translateY(0) !important; }
        .btn-active:active { transform: scale(0.95); }
        /* 電腦版雙欄顯示 */
        @media (min-width: 768px) {
            #menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        }
    </style>
</head>
<body class="bg-stone-50 min-h-screen">

    <div class="fixed top-2 right-2 flex gap-1 z-[60]">
        <button onclick="checkAuth('收銀.html')" class="h-7 px-2.5 bg-stone-800 text-white rounded-lg shadow-md flex items-center gap-1 btn-active border border-stone-700">
            <span class="text-xs">💰</span>
            <span class="text-[10px] font-bold tracking-tight">收銀統計</span>
        </button>
        <button onclick="checkAuth('後台.html')" class="h-7 px-2.5 bg-white border border-green-500 rounded-lg shadow-md flex items-center gap-1 btn-active">
            <span class="text-xs">⚙️</span>
            <span class="text-[10px] font-bold text-green-600 tracking-tight">管理後台</span>
        </button>
    </div>

    <nav class="bg-white p-4 border-b border-stone-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-end">
            <div class="space-y-1">
                <h1 class="text-2xl font-black text-green-600 italic tracking-tighter">GUAVA HUB 🍹</h1>
                <div class="flex flex-wrap gap-2 items-center">
                    <div class="bg-green-50 px-3 py-1 rounded-full border border-green-100 inline-flex items-center gap-2">
                        <span class="text-[10px] bg-green-500 text-white px-2 py-0.5 rounded-full font-bold">本日取貨點</span>
                        <p class="text-xs text-green-800 font-bold">自由黃昏市場 2排94號 (02:00 開攤)</p> 
                    </div>
                    <button id="install-btn" class="hidden bg-stone-900 text-white text-[10px] px-3 py-1 rounded-full font-bold flex items-center gap-1 btn-active shadow-sm">
                        <span>📲</span> 下載 APP
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        
        <section class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-stone-100 mb-6 transition-all hover:shadow-md">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <img src="image_331293.jpg" class="w-full md:w-40 h-40 rounded-3xl object-cover shadow-sm" alt="鮮榨芭樂汁攤位">
                <div class="flex-1 space-y-3">
                    <h2 class="text-lg font-black text-stone-800 flex items-center gap-2">
                        <span class="w-2 h-6 bg-green-500 rounded-full"></span> 慢磨鮮榨．原汁原味
                    </h2>
                    <p class="text-sm text-stone-600 leading-relaxed font-medium">
                        本芭樂汁採用<span class="text-green-600 font-bold">慢磨機</span>果渣分離，保留最高營養。堅持<span class="font-bold text-green-600">無糖、無水</span>，給您最純粹的健康。
                    </p>
                    
                    <div class="bg-green-50/50 p-4 rounded-2xl border border-green-100 space-y-2">
                        <h4 class="text-xs font-black text-green-700 flex items-center gap-1">
                            <span>🥤</span> 建議喝法
                        </h4>
                        <div class="text-[13px] space-y-1.5 text-stone-700 font-medium">
                            <p>• <span class="font-bold">純粹飲用</span>：直接飲用感受芭樂最濃郁的原始果香。</p>
                            <p>• <span class="font-bold">加水調整</span>：若覺口感過於濃郁太甜，可依個人喜好加適量水或冰塊調整。</p>
                            <p>• <span class="font-bold">風味進階</span>：加入少許甘梅粉，鹹甜交織更具層次風味！</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="menu" class="space-y-4 md:space-y-0">
            </div>

        <footer class="mt-8 mb-32">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-stone-100 flex flex-col gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-xl">📍</div>
                    <div>
                        <h3 class="font-black text-stone-800 text-sm uppercase tracking-wider">已完成預約取貨資訊</h3>
                        <p class="text-[11px] text-stone-400 font-bold">下單後請於指定時間前往領取</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-stone-50 p-4 rounded-2xl border border-stone-100">
                        <p class="text-[10px] font-bold text-stone-400 mb-1 uppercase">自取時間</p>
                        <p class="text-sm font-black text-stone-800">14:00 - 18:30</p>
                    </div>
                    <div class="bg-stone-50 p-4 rounded-2xl border border-stone-100">
                        <p class="text-[10px] font-bold text-stone-400 mb-1 uppercase">自取地點</p>
                        <p class="text-sm font-black text-stone-800">自由黃昏市場 2排94號</p>
                    </div>
                </div>
                
                <p class="text-[10px] text-center text-stone-400 font-medium">
                    如有任何問題，請聯絡現場服務人員。
                </p>
            </div>
        </footer>
    </main>

    <div id="checkout-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-xl bg-stone-900/95 backdrop-blur text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center z-50 translate-y-40 transition-all duration-500 border border-white/10">
        <div class="pl-2">
            <p id="item-count" class="text-[10px] opacity-50 font-bold tracking-widest uppercase">已選擇商品</p>
            <p class="text-3xl font-black text-green-400">$<span id="total-price">0</span></p>
        </div>
        <button onclick="openDrawer()" class="bg-green-500 text-black px-10 py-4 rounded-[1.8rem] font-black text-lg btn-active">
            結帳去
        </button>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/60 z-[60] hidden opacity-0 transition-opacity duration-300" onclick="closeDrawer()"></div>
    <div id="drawer" class="fixed bottom-0 left-0 right-0 bg-white p-8 rounded-t-[3rem] z-[70] translate-y-full transition-transform duration-300 max-w-2xl mx-auto">
        <div class="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-8"></div>
        <h2 class="text-2xl font-black mb-6 text-stone-800 font-bold">訂單確認</h2>
        <div id="summary-list" class="space-y-4 mb-8"></div>
        <input type="text" id="user-name" placeholder="請輸入姓名 (取貨用)" class="w-full bg-stone-100 p-5 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-green-500 mb-4 text-lg">
        <button onclick="sendOrder()" id="send-btn" class="w-full bg-green-500 text-stone-900 py-5 rounded-[2rem] font-black text-xl shadow-xl btn-active">
            送出訂單 🚀
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCgmCslx_E4tuQGOm8fccKNkCR2LnmjD8g",
            databaseURL: "https://studio-2370518507-ee5e3-default-rtdb.firebaseio.com",
            projectId: "studio-2370518507-ee5e3",
            appId: "1:960169055224:web:7db7942ca9876fbdbf3c0d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // PWA 安裝邏輯
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        const products = [
            { id: 'big_1', name: '大瓶 (單瓶)', price: 70, img: '5.png', desc: '原味鮮榨' },
            { id: 'big_2', name: '大瓶 (2瓶優惠組)', price: 120, img: '5.png', desc: '超值省 $20' },
            { id: 'small_1', name: '小瓶 (單瓶)', price: 60, img: '2.png', desc: '隨身好喝' },
            { id: 'small_2', name: '小瓶 (2瓶優惠組)', price: 100, img: '2.png', desc: '超值省 $20' }
        ];

        let cart = {};

        function render() {
            const menu = document.getElementById('menu');
            menu.innerHTML = '';
            products.forEach(p => {
                menu.innerHTML += `
                    <div class="bg-white p-4 rounded-[2.5rem] flex items-center justify-between shadow-sm border border-stone-100">
                        <div class="flex items-center gap-3">
                            <img src="${p.img}" class="w-16 h-16 rounded-[1.5rem] object-cover" alt="${p.name}">
                            <div>
                                <h3 class="font-bold text-stone-800 text-base leading-tight">${p.name}</h3>
                                <p class="text-green-600 font-black text-lg">$${p.price}</p>
                                <p class="text-[10px] text-stone-400 font-bold">${p.desc}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 bg-stone-50 p-1 rounded-full border border-stone-100">
                            <button onclick="updateCart('${p.id}', -1)" class="w-9 h-9 rounded-full bg-white shadow-sm flex items-center justify-center font-bold text-stone-300 btn-active">-</button>
                            <span id="qty-${p.id}" class="font-black w-4 text-center text-md">0</span>
                            <button onclick="updateCart('${p.id}', 1)" class="w-9 h-9 rounded-full bg-white shadow-sm flex items-center justify-center font-bold text-green-600 btn-active">+</button>
                        </div>
                    </div>`;
            });
        }

        function updateCart(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] <= 0) delete cart[id];
            document.getElementById(`qty-${id}`).innerText = cart[id] || 0;
            
            let total = 0, count = 0;
            Object.keys(cart).forEach(pid => {
                const p = products.find(x => x.id === pid);
                total += p.price * cart[pid];
                count += cart[pid];
            });

            document.getElementById('total-price').innerText = total;
            document.getElementById('item-count').innerText = `${count} ITEMS`;
            document.getElementById('checkout-bar').style.transform = count > 0 ? 'translateX(-50%) translateY(0)' : 'translateX(-50%) translateY(160px)';
        }

        function openDrawer() {
            const list = document.getElementById('summary-list');
            list.innerHTML = '';
            Object.keys(cart).forEach(id => {
                const p = products.find(x => x.id === id);
                list.innerHTML += `<div class="flex justify-between font-bold text-stone-700 bg-stone-50 p-4 rounded-2xl">
                    <span>${p.name} x${cart[id]}</span>
                    <span>$${p.price * cart[id]}</span>
                </div>`;
            });
            document.getElementById('overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('overlay').style.opacity = '1';
                document.getElementById('drawer').classList.add('drawer-up');
            }, 10);
        }

        function closeDrawer() {
            document.getElementById('overlay').style.opacity = '0';
            document.getElementById('drawer').classList.remove('drawer-up');
            setTimeout(() => document.getElementById('overlay').classList.add('hidden'), 300);
        }

        function checkAuth(targetUrl) {
            if (sessionStorage.getItem("adminAuth") === "true") {
                window.location.href = targetUrl;
                return;
            }
            const pw = prompt("請輸入管理密碼：");
            if (pw === "0000") { 
                sessionStorage.setItem("adminAuth", "true"); 
                window.location.href = targetUrl; 
            }
            else if (pw !== null) alert("密碼錯誤！");
        }

        function sendOrder() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("請輸入姓名！");
            const btn = document.getElementById('send-btn');
            btn.innerText = "傳送中..."; btn.disabled = true;

            const detail = Object.keys(cart).map(id => {
                const p = products.find(x => x.id === id);
                return `${p.name}x${cart[id]}`;
            }).join(', ');

            db.ref('orders').push({
                customer: name, 
                items: detail, 
                total: document.getElementById('total-price').innerText, 
                time: Date.now()
            }).then(() => { 
                alert("🎉 下單成功！請依下方資訊前往取貨。"); 
                location.reload(); 
            });
        }

        // 註冊 Service Worker (PWA 必要)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }

        render();
    </script>
</body>
</html>
