<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUAVA HUB 預約系統</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8f8f8; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: white; border-radius: 30px; border: 2px solid #2ecc71; padding: 20px; box-sizing: border-box; }
        
        /* 標頭區塊 */
        .status-header { display: flex; align-items: center; margin-bottom: 20px; }
        .check-icon { width: 40px; height: 40px; background: #2ecc71; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; margin-right: 15px; }
        .title { font-size: 1.2rem; font-weight: bold; }
        .user-name { color: #2ecc71; }
        .subtitle { color: #888; font-size: 0.9rem; margin-top: 5px; }

        /* 預約資訊欄位 */
        .info-container { display: flex; gap: 10px; margin-top: 15px; }
        .info-box { flex: 1; padding: 15px; border-radius: 15px; text-align: center; }
        
        /* 時間軸選擇器樣式 */
        .time-box { background-color: #fff0f0; border: 1px solid #ffdede; cursor: pointer; }
        .time-label { color: #e74c3c; font-size: 0.8rem; margin-bottom: 5px; }
        .time-select { 
            width: 100%; 
            border: none; 
            background: transparent; 
            color: #e74c3c; 
            font-size: 1.2rem; 
            font-weight: bold; 
            text-align: center;
            outline: none;
            cursor: pointer;
            appearance: none; /* 隱藏原生箭頭讓視覺更乾淨 */
        }

        /* 地點顯示 */
        .location-box { background-color: #f5f5f5; text-align: left; }
        .location-label { color: #888; font-size: 0.8rem; margin-bottom: 5px; }
        .location-text { font-size: 0.9rem; font-weight: bold; color: #333; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <div class="status-header">
        <div class="check-icon">✓</div>
        <div>
            <div class="title">預約成功！<span class="user-name">POLLY 同學</span></div>
            <div class="subtitle">請向現場人員出示此畫面領取</div>
        </div>
    </div>

    <div class="info-container">
        <div class="info-box time-box">
            <div class="time-label">自選取貨時段</div>
            <select class="time-select">
                <option value="15:00">15:00</option>
                <option value="15:30">15:30</option>
                <option value="16:00">16:00</option>
                <option value="16:30" selected>16:30</option>
                <option value="17:00">17:00</option>
                <option value="17:30">17:30</option>
                <option value="18:00">18:00</option>
                <option value="18:30">18:30</option>
            </select>
        </div>

        <div class="info-box location-box">
            <div class="location-label">自取地點</div>
            <div class="location-text">自由黃昏市場<br>2 排 94 號</div>
        </div>
    </div>
</div>

</body>
</html>
