<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活力美髮｜芭樂汁團購</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* 針對 Chrome 手機版優化：防止長按彈出選單、移除點擊高亮 */
        body { 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
            overscroll-behavior-y: contain; /* 防止下拉重新整理影響購物體驗 */
        }
        .order-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-stone-50 text-stone-800">

    <nav class="sticky top-0 bg-white/80 ios-blur z-40 p-4 border-b border-stone-200">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-green-600 italic">GUAVA HUB</h1>
                <p class="text-[10px] text-stone-400 font-bold tracking-widest uppercase">活力美髮專屬團購</p>
            </div>
            <div id="cart-dot" class="w-2 h-2 bg-red-500 rounded-full animate-ping hidden"></div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-4" id="menu">
        </main>

    <div id="checkout-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-stone-900 text-white p-5 rounded-3xl shadow-2xl flex justify-between items-center z-50 translate-y-32 transition-transform duration-500">
        <div>
            <p id="item-count" class="text-xs text-stone-400 font-medium">0 份餐點</p>
            <p class="text-2xl font-black text-green-400">$<span id="total-price">0</span></p>
        </div>
        <button onclick="openDrawer()" class="bg-green-500 text-stone-900 px-8 py-3 rounded-2xl font-black active:scale-95 transition-transform">
            結帳
        </button>
    </div>

    <div id="drawer-overlay" class="fixed inset-0 bg-black/40 z-[60] hidden opacity-0 transition-opacity duration-300" onclick="closeDrawer()"></div>
    <div id="drawer" class="fixed bottom-0 left-0 right-0 bg-white z-[70] rounded-t-[2.5rem] p-8 translate-y-full order-drawer">
        <div class="w-12 h-1 bg-stone-200 rounded-full mx-auto mb-8"></div>
        <h2 class="text-2xl font-black mb-6">訂單內容</h2>
        
        <div id="summary-list" class="space-y-4 mb-8 max-h-[30vh] overflow-y-auto">
            </div>

        <div class="space-y-4">
            <input type="text" id="user-name" placeholder="請輸入姓名" class="w-full bg-stone-100 p-4 rounded-2xl border-none outline-none focus:ring-2 focus:ring-green-500 font-bold">
            <button onclick="sendToFirebase()" id="confirm-btn" class="w-full bg-green-500 text-stone-900 py-5 rounded-2xl font-black text-lg shadow-xl shadow-green-200 active:scale-95 transition-all">
                確認訂購 🚀
            </button>
        </div>
    </div>

    <script>
        // --- 1. Firebase 配置 (電腦端替換你的 Config) ---
        const firebaseConfig = {
            apiKey: "你的API_KEY",
            databaseURL: "你的資料庫網址",
            projectId: "你的專案ID",
            appId: "你的APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. 商品設定 ---
        const products = [
            { id: 'juice_1', name: '經典芭樂汁', price: 50, color: 'bg-green-100', emoji: '🍹' },
            { id: 'juice_2', name: '甘梅芭樂汁', price: 55, color: 'bg-red-50', emoji: '🧂' },
            { id: 'juice_3', name: '芭樂檸檬派對', price: 65, color: 'bg-yellow-50', emoji: '🍋' }
        ];

        let cart = {};

        // --- 3. 渲染網頁 ---
        function render() {
            const menu = document.getElementById('menu');
            products.forEach(p => {
                menu.innerHTML += `
                    <div class="bg-white border border-stone-100 p-4 rounded-[2rem] flex items-center justify-between shadow-sm">
                        <div class="flex items-center gap-4">
                            <div class="${p.color} w-16 h-16 rounded-[1.5rem] flex items-center justify-center text-3xl shadow-inner">${p.emoji}</div>
                            <div>
                                <h3 class="font-bold text-lg">${p.name}</h3>
                                <p class="text-green-600 font-black">$${p.price}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="updateCart('${p.id}', -1)" class="w-10 h-10 rounded-full border border-stone-100 flex items-center justify-center font-bold text-stone-400 active:bg-stone-100">-</button>
                            <span id="q-${p.id}" class="w-4 text-center font-black">0</span>
                            <button onclick="updateCart('${p.id}', 1)" class="w-10 h-10 rounded-full border border-stone-100 flex items-center justify-center font-bold text-green-600 active:bg-green-50">-</button>
                        </div>
                    </div>
                `;
            });
        }

        // --- 4. 購物車核心邏輯 ---
        function updateCart(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] <= 0) delete cart[id];

            // 更新數字顯示
            products.forEach(p => {
                document.getElementById(`q-${p.id}`).innerText = cart[p.id] || 0;
            });

            // 計算總數與金額
            let total = 0, count = 0;
            Object.keys(cart).forEach(pid => {
                const p = products.find(x => x.id === pid);
                total += p.price * cart[pid];
                count += cart[pid];
            });

            // 顯示底部結帳條
            const bar = document.getElementById('checkout-bar');
            document.getElementById('total-price').innerText = total;
            document.getElementById('item-count').innerText = `${count} 份餐點`;
            bar.style.transform = count > 0 ? 'translateX(-50%) translateY(0)' : 'translateX(-50%) translateY(120px)';
        }

        // --- 5. 抽屜控制 ---
        function openDrawer() {
            const list = document.getElementById('summary-list');
            list.innerHTML = '';
            Object.keys(cart).forEach(id => {
                const p = products.find(x => x.id === id);
                list.innerHTML += `
                    <div class="flex justify-between items-center font-bold">
                        <span class="text-stone-500">${p.name} <span class="text-stone-300">x${cart[id]}</span></span>
                        <span>$${p.price * cart[id]}</span>
                    </div>`;
            });
            document.getElementById('drawer-overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('drawer-overlay').style.opacity = '1';
                document.getElementById('drawer').style.transform = 'translateY(0)';
            }, 10);
        }

        function closeDrawer() {
            document.getElementById('drawer-overlay').style.opacity = '0';
            document.getElementById('drawer').style.transform = 'translateY(110%)';
            setTimeout(() => document.getElementById('drawer-overlay').classList.add('hidden'), 300);
        }

        // --- 6. 最終提交 (Firebase + 簡訊) ---
        function sendToFirebase() {
            const name = document.getElementById('user-name').value;
            const adminPhone = "09XXXXXXXX"; // 請輸入收件人的手機
            
            if(!name) return alert("大師，請輸入姓名喔！");

            const btn = document.getElementById('confirm-btn');
            btn.disabled = true;
            btn.innerText = "訂單雲端同步中...";

            const detailStr = Object.keys(cart).map(id => {
                const p = products.find(x => x.id === id);
                return `${p.name}x${cart[id]}`;
            }).join(', ');

            const total = document.getElementById('total-price').innerText;

            // A. 寫入 Firebase
            db.ref('orders').push({
                customer: name,
                items: detailStr,
                total: total,
                timestamp: Date.now()
            }).then(() => {
                // B. 喚起手機簡訊 (Chrome 手機版完美支援)
                const smsText = `【活力美髮訂單】\n訂購人：${name}\n明細：${detailStr}\n總額：$${total}`;
                window.location.href = `sms:${adminPhone}?body=${encodeURIComponent(smsText)}`;
                
                // C. 重置
                setTimeout(() => location.reload(), 2000);
            });
        }

        render();
    </script>
</body>
</html>
