<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUAVA HUB | 管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .btn-active:active { transform: scale(0.95); }
        @keyframes sync-pulse {
            0% { border-color: #e2e8f0; }
            50% { border-color: #22c55e; }
            100% { border-color: #e2e8f0; }
        }
        .sync-glow { animation: sync-pulse 2s infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="flex items-center gap-1 bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-xl transition-all btn-active border border-slate-700 text-white no-underline">
                    <span class="text-lg">🏠</span>
                    <span class="text-xs font-bold">回首頁</span>
                </a>
                <h1 class="text-xl font-black tracking-tighter text-green-400">ADMIN</h1>
            </div>
            <div class="flex items-center gap-2">
                <a href="收銀.html" class="text-[10px] font-bold bg-amber-500 text-black px-3 py-1.5 rounded-lg btn-active">💰 收銀統計</a>
                <div id="stat" class="text-sm font-bold bg-slate-800 px-3 py-1 rounded-lg border border-slate-700 hidden md:block">
                    今日營收: $<span id="today-total">0</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        
        <section class="bg-white p-6 rounded-[2rem] shadow-sm border-2 border-slate-100 sync-glow">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">📍 今日取貨資訊設定</h2>
                <span class="text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded-md font-bold uppercase">即時同步</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="col-span-2 md:col-span-1">
                    <label class="text-[10px] font-bold text-slate-400 ml-1">市場名稱</label>
                    <input type="text" id="loc-market" placeholder="自由黃昏市場" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 ml-1">排</label>
                    <input type="text" id="loc-row" placeholder="3" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 ml-1">號</label>
                    <input type="text" id="loc-no" placeholder="15" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="text-[10px] font-bold text-slate-400 ml-1">開攤時間</label>
                    <input type="time" id="loc-time" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-green-500">
                </div>
            </div>
            <button onclick="updateLocation()" class="w-full mt-4 bg-green-600 text-white py-4 rounded-2xl font-bold btn-active shadow-lg shadow-green-200 transition-all active:bg-green-700">
                更新地點與時間 🚀
            </button>
        </section>

        <section class="bg-white p-6 rounded-[2rem] shadow-sm border-2 border-slate-100">
            <h2 class="text-lg font-black text-slate-800 mb-4 flex items-center gap-2">📢 門市狀態切換</h2>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setStatus('open')" id="btn-status-open" class="py-3 rounded-xl font-bold border-2 transition-all">營運中</button>
                <button onclick="setStatus('soldout')" id="btn-status-soldout" class="py-3 rounded-xl font-bold border-2 transition-all">已售完</button>
                <button onclick="setStatus('closed')" id="btn-status-closed" class="py-3 rounded-xl font-bold border-2 transition-all">結束營業</button>
            </div>
        </section>

        <section class="bg-slate-900 p-6 rounded-[2rem] shadow-xl text-white">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-black flex items-center gap-2">📊 今日待備貨總計</h2>
                <span class="text-[10px] border border-white/30 px-2 py-1 rounded font-bold text-white/50 uppercase">待處理訂單匯總</span>
            </div>
            <div id="prep-summary" class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="text-center p-3 bg-white/10 rounded-2xl border border-white/10">載入中...</div>
            </div>
        </section>

        <section>
            <h2 class="text-lg font-black mb-4 flex items-center gap-2 text-slate-800">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                </span>
                待處理訂單
            </h2>
            <div id="live-orders" class="grid gap-4">
                <p class="text-slate-400 text-sm">載入中...</p>
            </div>
        </section>

        <section class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                <h2 class="text-lg font-black mb-4 text-slate-800">📜 歷史紀錄抽屜</h2>
                <div class="flex flex-wrap gap-2">
                    <input type="text" id="search-input" oninput="filterHistory()" placeholder="搜尋姓名..." class="flex-1 bg-white border border-slate-200 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-green-500">
                    <input type="date" id="date-input" onchange="filterHistory()" class="bg-white border border-slate-200 p-3 rounded-xl text-sm outline-none">
                </div>
            </div>
            <div id="history-list" class="divide-y divide-slate-50 max-h-[60vh] overflow-y-auto"></div>
        </section>
    </main>

    <script>
        if (sessionStorage.getItem('admin') !== 'ok') { window.location.href = "index.html"; }

        const firebaseConfig = {
            apiKey: "AIzaSyCgmCslx_E4tuQGOm8fccKNkCR2LnmjD8g",
            databaseURL: "https://studio-2370518507-ee5e3-default-rtdb.firebaseio.com",
            projectId: "studio-2370518507-ee5e3",
            appId: "1:960169055224:web:7db7942ca9876fbdbf3c0d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const productNames = ["大瓶 (單瓶)", "大瓶 (2瓶優惠組)", "小瓶 (單瓶)", "小瓶 (2瓶優惠組)"];

        // --- 核心：統計與訂單顯示 ---
        db.ref('orders').on('value', snapshot => {
            const liveDiv = document.getElementById('live-orders');
            const prepDiv = document.getElementById('prep-summary');
            liveDiv.innerHTML = '';
            
            const data = snapshot.val();
            const prepStats = {};
            productNames.forEach(name => prepStats[name] = 0);

            if (!data) { 
                liveDiv.innerHTML = '<div class="text-center py-10 text-slate-400 bg-white rounded-3xl border-2 border-dashed border-slate-100">目前沒有待處理訂單</div>';
                renderPrepSummary(prepStats);
                return; 
            }
            
            Object.keys(data).forEach(id => {
                const order = data[id];
                
                // 累計備貨數量
                if(order.items) {
                    const itemsArray = order.items.split(', ');
                    itemsArray.forEach(itemStr => {
                        const [name, qty] = itemStr.split('x');
                        if (prepStats[name] !== undefined) { prepStats[name] += parseInt(qty); }
                    });
                }

                const orderTime = new Date(order.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                liveDiv.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-green-500 flex justify-between items-center transition-all hover:shadow-md">
                        <div class="flex-1">
                            <p class="text-[10px] text-slate-400 font-bold uppercase">填單:${orderTime} | <span class="text-green-600 font-black">預計取貨:${order.pickup_time || '未填'}</span></p>
                            <h3 class="font-black text-slate-800 text-lg leading-tight">${order.customer}</h3>
                            <p class="text-slate-500 text-sm mt-1 font-medium">${order.items}</p>
                            <p class="text-green-600 font-black mt-1">$${order.total}</p>
                        </div>
                        <button onclick="completeOrder('${id}')" class="ml-4 bg-slate-900 text-white px-6 py-4 rounded-2xl font-bold btn-active whitespace-nowrap">完成</button>
                    </div>`;
            });
            renderPrepSummary(prepStats);
        });

        function renderPrepSummary(stats) {
            const prepDiv = document.getElementById('prep-summary');
            prepDiv.innerHTML = Object.entries(stats).map(([name, count]) => `
                <div class="bg-white/10 p-3 rounded-2xl border border-white/10 flex flex-col items-center">
                    <p class="text-[9px] font-bold text-white/50 mb-1 leading-tight h-6 text-center">${name}</p>
                    <p class="text-2xl font-black ${count > 0 ? 'text-green-400' : 'text-white/20'}">${count}</p>
                </div>
            `).join('');
        }

        // --- 地點功能 ---
        db.ref('config/pickupLocationData').on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('loc-market').value = data.market || "";
                document.getElementById('loc-row').value = data.row || "";
                document.getElementById('loc-no').value = data.no || "";
                document.getElementById('loc-time').value = data.time || "";
            }
        });

        function updateLocation() {
            const market = document.getElementById('loc-market').value;
            const row = document.getElementById('loc-row').value;
            const no = document.getElementById('loc-no').value;
            const time = document.getElementById('loc-time').value;
            if(!market || !row || !no || !time) return alert("請完整填寫！");
            const fullString = `${market} ${row}排${no}號 (${time} 開攤)`;
            db.ref('config').update({
                pickupLocation: fullString,
                pickupLocationData: { market, row, no, time }
            }).then(() => alert("✅ 地點同步成功！"));
        }

        // --- 狀態切換 ---
        db.ref('config/shopStatus').on('value', snap => {
            const status = snap.val() || 'open';
            const btns = { open: document.getElementById('btn-status-open'), soldout: document.getElementById('btn-status-soldout'), closed: document.getElementById('btn-status-closed') };
            Object.values(btns).forEach(b => b.className = "py-3 rounded-xl font-bold border-2 border-slate-100 text-slate-400 bg-slate-50");
            if(status === 'open') btns.open.className = "py-3 rounded-xl font-bold border-2 border-green-500 text-green-600 bg-green-50";
            if(status === 'soldout') btns.soldout.className = "py-3 rounded-xl font-bold border-2 border-amber-500 text-amber-600 bg-amber-50";
            if(status === 'closed') btns.closed.className = "py-3 rounded-xl font-bold border-2 border-red-500 text-red-600 bg-red-50";
        });
        function setStatus(s) { db.ref('config').update({ shopStatus: s }); }

        // --- 歷史紀錄與完成訂單 ---
        let allHistory = [];
        db.ref('history').on('value', snapshot => {
            const data = snapshot.val();
            allHistory = [];
            let todayRev = 0;
            const todayStr = new Date().toDateString();
            if (data) {
                Object.keys(data).forEach(id => {
                    const h = data[id];
                    allHistory.push({id, ...h});
                    if (new Date(h.timestamp).toDateString() === todayStr) { todayRev += parseInt(h.total || 0); }
                });
            }
            document.getElementById('today-total').innerText = todayRev.toLocaleString();
            allHistory.sort((a, b) => b.timestamp - a.timestamp);
            filterHistory();
        });

        function completeOrder(id) {
            db.ref('orders/' + id).once('value', snapshot => {
                const data = snapshot.val();
                if (data) {
                    data.status = 'completed';
                    db.ref('history').push(data).then(() => {
                        db.ref('orders/' + id).remove();
                    });
                }
            });
        }

        function filterHistory() {
            const nameKey = document.getElementById('search-input').value.toLowerCase();
            const dateKey = document.getElementById('date-input').value;
            const listDiv = document.getElementById('history-list');
            listDiv.innerHTML = '';
            const filtered = allHistory.filter(h => {
                const orderDate = new Date(h.timestamp).toISOString().split('T')[0];
                return h.customer.toLowerCase().includes(nameKey) && (dateKey ? orderDate === dateKey : true);
            });
            if (filtered.length === 0) { listDiv.innerHTML = '<p class="p-10 text-center text-slate-400">找不到相符的紀錄</p>'; return; }
            filtered.forEach(h => {
                const dateObj = new Date(h.timestamp);
                listDiv.innerHTML += `
                    <div class="p-4 flex justify-between items-center hover:bg-slate-50 transition-colors">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} | 取貨:${h.pickup_time || '-'}</p>
                            <h4 class="font-bold text-slate-700">${h.customer}</h4>
                            <p class="text-xs text-slate-500">${h.items}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-slate-800">$${h.total}</p>
                            <button onclick="deleteHistory('${h.id}')" class="text-[10px] text-red-300 hover:text-red-500 font-bold transition-colors">刪除</button>
                        </div>
                    </div>`;
            });
        }

        function deleteHistory(id) { if(confirm('永久刪除這筆紀錄，確定嗎？')) { db.ref('history/' + id).remove(); } }
    </script>
</body>
</html>
