<section class="bg-white p-6 rounded-[2rem] shadow-sm border-2 border-slate-100">
    <h2 class="text-lg font-black text-slate-800 mb-4 flex items-center gap-2">📢 門市狀態切換</h2>
    <div class="grid grid-cols-3 gap-2">
        <button onclick="setStatus('open')" id="btn-status-open" class="py-3 rounded-xl font-bold border-2 transition-all">營運中</button>
        <button onclick="setStatus('soldout')" id="btn-status-soldout" class="py-3 rounded-xl font-bold border-2 transition-all">已售完</button>
        <button onclick="setStatus('closed')" id="btn-status-closed" class="py-3 rounded-xl font-bold border-2 transition-all">結束營業</button>
    </div>
    <p class="text-[10px] text-slate-400 mt-3 ml-1">※ 切換後，首頁下單功能將自動開啟或關閉。</p>
</section>

<script>
    // 監聽並更新按鈕樣式
    db.ref('config/shopStatus').on('value', snap => {
        const status = snap.val() || 'open';
        const btns = {
            open: document.getElementById('btn-status-open'),
            soldout: document.getElementById('btn-status-soldout'),
            closed: document.getElementById('btn-status-closed')
        };
        
        // 重設所有樣式
        Object.values(btns).forEach(b => b.className = "py-3 rounded-xl font-bold border-2 border-slate-100 text-slate-400 bg-slate-50");
        
        // 根據狀態上色
        if(status === 'open') btns.open.className = "py-3 rounded-xl font-bold border-2 border-green-500 text-green-600 bg-green-50";
        if(status === 'soldout') btns.soldout.className = "py-3 rounded-xl font-bold border-2 border-amber-500 text-amber-600 bg-amber-50";
        if(status === 'closed') btns.closed.className = "py-3 rounded-xl font-bold border-2 border-red-500 text-red-600 bg-red-50";
    });

    function setStatus(s) {
        db.ref('config').update({ shopStatus: s });
    }
</script>
