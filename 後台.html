<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUAVA HUB | 管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-green-400">GUAVA ADMIN</h1>
            <div id="stat" class="text-sm font-bold bg-slate-800 px-3 py-1 rounded-lg">
                今日營收: $<span id="today-total">0</span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-8">
        
        <section>
            <h2 class="text-lg font-black mb-4 flex items-center gap-2">
                <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>
                待處理訂單
            </h2>
            <div id="live-orders" class="grid gap-4">
                <p class="text-slate-400 text-sm">載入中...</p>
            </div>
        </section>

        <section class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100">
                <h2 class="text-lg font-black mb-4">📜 歷史紀錄抽屜</h2>
                <div class="flex flex-wrap gap-2">
                    <input type="text" id="search-input" oninput="filterHistory()" placeholder="搜尋姓名..." class="flex-1 bg-slate-100 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-green-500">
                    <input type="date" id="date-input" onchange="filterHistory()" class="bg-slate-100 p-3 rounded-xl text-sm outline-none">
                </div>
            </div>
            <div id="history-list" class="divide-y divide-slate-50 max-h-[60vh] overflow-y-auto">
                </div>
        </section>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCgmCslx_E4tuQGOm8fccKNkCR2LnmjD8g",
            databaseURL: "https://studio-2370518507-ee5e3-default-rtdb.firebaseio.com",
            projectId: "studio-2370518507-ee5e3",
            appId: "1:960169055224:web:7db7942ca9876fbdbf3c0d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allHistory = [];

        // 監聽新訂單
        db.ref('orders').on('value', snapshot => {
            const liveDiv = document.getElementById('live-orders');
            liveDiv.innerHTML = '';
            const data = snapshot.val();
            if (!data) {
                liveDiv.innerHTML = '<div class="text-center py-10 text-slate-400 bg-white rounded-3xl border-2 border-dashed border-slate-100">目前沒有新訂單</div>';
                return;
            }

            Object.keys(data).forEach(id => {
                const order = data[id];
                const time = new Date(order.time).toLocaleTimeString();
                liveDiv.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-green-500 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-slate-400 font-bold">${time}</p>
                            <h3 class="font-black text-slate-800 text-lg">${order.customer}</h3>
                            <p class="text-slate-600 text-sm">${order.items}</p>
                            <p class="text-green-600 font-black mt-1">$${order.total}</p>
                        </div>
                        <button onclick="completeOrder('${id}')" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold active:scale-95 transition-all">完成</button>
                    </div>`;
            });
        });

        // 監聽歷史紀錄
        db.ref('history').on('value', snapshot => {
            const data = snapshot.val();
            allHistory = [];
            let totalRev = 0;
            if (data) {
                Object.keys(data).forEach(id => {
                    allHistory.push({id, ...data[id]});
                    totalRev += parseInt(data[id].total || 0);
                });
            }
            document.getElementById('today-total').innerText = totalRev.toLocaleString();
            allHistory.sort((a, b) => b.time - a.time);
            filterHistory();
        });

        function completeOrder(id) {
            db.ref('orders/' + id).once('value', snapshot => {
                const data = snapshot.val();
                db.ref('history').push(data).then(() => {
                    db.ref('orders/' + id).remove();
                });
            });
        }

        function filterHistory() {
            const nameKey = document.getElementById('search-input').value.toLowerCase();
            const dateKey = document.getElementById('date-input').value;
            const listDiv = document.getElementById('history-list');
            listDiv.innerHTML = '';

            const filtered = allHistory.filter(h => {
                const orderDate = new Date(h.time).toISOString().split('T')[0];
                const matchName = h.customer.toLowerCase().includes(nameKey);
                const matchDate = dateKey ? orderDate === dateKey : true;
                return matchName && matchDate;
            });

            if (filtered.length === 0) {
                listDiv.innerHTML = '<p class="p-10 text-center text-slate-400">找不到相符的紀錄</p>';
                return;
            }

            filtered.forEach(h => {
                const dateObj = new Date(h.time);
                const dateStr = `${dateObj.getMonth()+1}/${dateObj.getDate()}`;
                const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                listDiv.innerHTML += `
                    <div class="p-4 flex justify-between items-center hover:bg-slate-50 transition-colors">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">${dateStr} ${timeStr}</p>
                            <h4 class="font-bold text-slate-700">${h.customer}</h4>
                            <p class="text-xs text-slate-500">${h.items}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-slate-800">$${h.total}</p>
                            <button onclick="deleteHistory('${h.id}')" class="text-[10px] text-red-300 hover:text-red-500 font-bold">刪除</button>
                        </div>
                    </div>`;
            });
        }

        function deleteHistory(id) {
            if(confirm('確定要永久刪除這筆紀錄嗎？')) db.ref('history/' + id).remove();
        }
    </script>
</body>
</html>
