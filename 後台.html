<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUAVA HUB | 管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .btn-active:active { transform: scale(0.95); }
        /* 平滑過渡 */
        .sync-glow { animation: sync-pulse 2s infinite; }
        @keyframes sync-pulse {
            0% { border-color: #e2e8f0; }
            50% { border-color: #22c55e; }
            100% { border-color: #e2e8f0; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="flex items-center gap-1 bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-xl transition-all btn-active border border-slate-700 text-white no-underline">
                    <span class="text-lg">🏠</span>
                    <span class="text-xs font-bold">回首頁</span>
                </a>
                <h1 class="text-xl font-black tracking-tighter text-green-400">ADMIN</h1>
            </div>
            
            <div class="flex items-center gap-2">
                <a href="收銀.html" class="text-[10px] font-bold bg-amber-500 text-black px-3 py-1.5 rounded-lg btn-active">
                    💰 收銀統計
                </a>
                <div id="stat" class="text-sm font-bold bg-slate-800 px-3 py-1 rounded-lg border border-slate-700 hidden md:block">
                    今日營收: $<span id="today-total">0</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        
        <section class="bg-white p-6 rounded-[2rem] shadow-sm border-2 border-slate-100 sync-glow">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
                    📍 今日取貨資訊設定
                </h2>
                <span class="text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded-md font-bold uppercase">即時同步中</span>
            </div>
            <div class="flex gap-2">
                <input type="text" id="location-input" placeholder="例如：自由黃昏市場 3排15號 / 16:00取貨" 
                    class="flex-1 bg-slate-50 border border-slate-200 p-4 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-green-500 transition-all">
                <button onclick="updateLocation()" class="bg-green-600 text-white px-6 py-4 rounded-2xl font-bold btn-active shadow-lg shadow-green-200 transition-all active:bg-green-700">
                    儲存修改
                </button>
            </div>
            <p class="text-[10px] text-slate-400 mt-3 ml-1 font-medium italic">提示：此處修改後，首頁標題下方的「本日取貨點」會同步更換。</p>
        </section>

        <section>
            <h2 class="text-lg font-black mb-4 flex items-center gap-2 text-slate-800">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                </span>
                待處理訂單
            </h2>
            <div id="live-orders" class="grid gap-4">
                <p class="text-slate-400 text-sm">載入中...</p>
            </div>
        </section>

        <section class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                <h2 class="text-lg font-black mb-4 text-slate-800">📜 歷史紀錄抽屜</h2>
                <div class="flex flex-wrap gap-2">
                    <input type="text" id="search-input" oninput="filterHistory()" placeholder="搜尋姓名..." class="flex-1 bg-white border border-slate-200 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-green-500">
                    <input type="date" id="date-input" onchange="filterHistory()" class="bg-white border border-slate-200 p-3 rounded-xl text-sm outline-none">
                </div>
            </div>
            <div id="history-list" class="divide-y divide-slate-50 max-h-[60vh] overflow-y-auto"></div>
        </section>

    </main>

    <script>
        // 權限檢查
        if (sessionStorage.getItem("adminAuth") !== "true") {
            window.location.href = "index.html";
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCgmCslx_E4tuQGOm8fccKNkCR2LnmjD8g",
            databaseURL: "https://studio-2370518507-ee5e3-default-rtdb.firebaseio.com",
            projectId: "studio-2370518507-ee5e3",
            appId: "1:960169055224:web:7db7942ca9876fbdbf3c0d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. 讀取並監控當前地點
        db.ref('config/pickupLocation').on('value', snap => {
            if(snap.val()) {
                document.getElementById('location-input').value = snap.val();
            }
        });

        // 2. 更新地點功能
        function updateLocation() {
            const newLoc = document.getElementById('location-input').value;
            if(!newLoc) return alert("請輸入取貨地點！");
            
            db.ref('config').update({
                pickupLocation: newLoc
            }).then(() => {
                alert("✅ 取貨地點已成功更新！");
            }).catch(err => {
                alert("❌ 更新失敗：" + err);
            });
        }

        let allHistory = [];

        // 監聽新訂單 (顯示取貨時間)
        db.ref('orders').on('value', snapshot => {
            const liveDiv = document.getElementById('live-orders');
            liveDiv.innerHTML = '';
            const data = snapshot.val();
            if (!data) {
                liveDiv.innerHTML = '<div class="text-center py-10 text-slate-400 bg-white rounded-3xl border-2 border-dashed border-slate-100">目前沒有新訂單</div>';
                return;
            }

            Object.keys(data).forEach(id => {
                const order = data[id];
                const time = new Date(order.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                liveDiv.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-green-500 flex justify-between items-center transition-all hover:shadow-md">
                        <div class="flex-1">
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">
                                填單:${time} | <span class="text-green-600">預計取貨:${order.pickupTime || '未填'}</span>
                            </p>
                            <h3 class="font-black text-slate-800 text-lg leading-tight">${order.customer}</h3>
                            <p class="text-slate-500 text-sm mt-1 font-medium">${order.items}</p>
                            <p class="text-green-600 font-black mt-1">$${order.total}</p>
                        </div>
                        <button onclick="completeOrder('${id}')" class="ml-4 bg-slate-900 text-white px-6 py-4 rounded-2xl font-bold btn-active transition-all whitespace-nowrap">完成</button>
                    </div>`;
            });
        });

        // 監聽歷史紀錄並計算本日營收
        db.ref('history').on('value', snapshot => {
            const data = snapshot.val();
            allHistory = [];
            let todayRev = 0;
            const todayStr = new Date().toDateString();

            if (data) {
                Object.keys(data).forEach(id => {
                    const h = data[id];
                    allHistory.push({id, ...h});
                    if (new Date(h.time).toDateString() === todayStr) {
                        todayRev += parseInt(h.total || 0);
                    }
                });
            }
            document.getElementById('today-total').innerText = todayRev.toLocaleString();
            allHistory.sort((a, b) => b.time - a.time);
            filterHistory();
        });

        function completeOrder(id) {
            db.ref('orders/' + id).once('value', snapshot => {
                const data = snapshot.val();
                if (data) {
                    db.ref('history').push(data).then(() => {
                        db.ref('orders/' + id).remove();
                    });
                }
            });
        }

        function filterHistory() {
            const nameKey = document.getElementById('search-input').value.toLowerCase();
            const dateKey = document.getElementById('date-input').value;
            const listDiv = document.getElementById('history-list');
            listDiv.innerHTML = '';

            const filtered = allHistory.filter(h => {
                const orderDate = new Date(h.time).toISOString().split('T')[0];
                const matchName = h.customer.toLowerCase().includes(nameKey);
                const matchDate = dateKey ? orderDate === dateKey : true;
                return matchName && matchDate;
            });

            if (filtered.length === 0) {
                listDiv.innerHTML = '<p class="p-10 text-center text-slate-400">找不到相符的紀錄</p>';
                return;
            }

            filtered.forEach(h => {
                const dateObj = new Date(h.time);
                const dateStr = `${dateObj.getMonth()+1}/${dateObj.getDate()}`;
                const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                listDiv.innerHTML += `
                    <div class="p-4 flex justify-between items-center hover:bg-slate-50 transition-colors">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">${dateStr} ${timeStr} | 取貨:${h.pickupTime || '-'}</p>
                            <h4 class="font-bold text-slate-700">${h.customer}</h4>
                            <p class="text-xs text-slate-500">${h.items}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-slate-800">$${h.total}</p>
                            <button onclick="deleteHistory('${h.id}')" class="text-[10px] text-red-300 hover:text-red-500 font-bold transition-colors">刪除</button>
                        </div>
                    </div>`;
            });
        }

        function deleteHistory(id) {
            if(confirm('警告：這將會永久刪除這筆收支紀錄，確定嗎？')) {
                db.ref('history/' + id).remove();
            }
        }
    </script>
</body>
</html>
